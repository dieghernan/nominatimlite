url: https://dieghernan.github.io/nominatimlite

template:
  bootstrap: 5
  package: gitdevr
  params:
    ganalytics: G-5SLV8G8QD4
  opengraph:
    twitter:
      creator: '@dhernangomez'
      card: summary_large_image

development:
  mode: auto

repo:
  branch: main

home:
  title: nominatimlite | Interface to the OpenStreetMap Nominatim API
  description: |
    Lightweight interface to the OpenStreetMap Nominatim API for geocoding,
    reverse geocoding, amenity lookup and address lookup. Results can be
    returned as data frames (tibbles) or sf objects.

authors:
  Diego Hernangómez:
    href: https://dieghernan.github.io/
  Jindra Lacko:
    href: https://www.jla-data.net/
  OpenStreetMap:
    href: https://www.openstreetmap.org/copyright/
    html: >
      <img src='https://wiki.openstreetmap.org/w/images/6/6f/Made_with.svg'
      width='150' alt='OpenStreetMap' style='margin-bottom: 3px;'>
 
reference:
- title: Geocoding
  desc: >
    Search addresses and structured queries to return coordinates.
- contents:
  - starts_with("geo_lite")

- title: Reverse geocoding
  desc: >
    Reverse geocode coordinates to return addresses and place information.
- contents:
  - has_concept("reverse")

- title: Lookup tools
- subtitle: Amenity lookup
  desc: >
    Search OpenStreetMap amenities within a bounding box.
- contents:
  - has_concept("amenity")

- subtitle: Address lookup
  desc: >
    Retrieve address details for OSM node, way and relation identifiers.
- contents:
  - has_concept("lookup")

- title: Spatial outputs
  desc: >
    Return API results as `sf` objects and convert bounding boxes to `sf`
    geometries.
- contents:
  - has_concept("spatial")

- title: Datasets
  desc: >
    Data shipped with the package.
- contents:
  - has_concept("datasets")

- title: Package documentation
- contents:
  - nominatimlite-package

articles:
- title: Get started
  desc: >
    Introduction to nominatimlite. Learn how to geocode addresses,
    reverse geocode coordinates and work with Nominatim search results.
  contents:
  - nominatimlite

- title: Maps and visualisation
  navbar: Articles
  desc: >
    Display geocoding results on interactive maps with leaflet and
    integrate Nominatim data into spatial workflows.
  contents:
  - articles/leaflet
 