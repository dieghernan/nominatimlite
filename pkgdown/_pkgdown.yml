url: https://dieghernan.github.io/nominatimlite

template:
  bootstrap: 5
  package: gitdevr
  params:
    ganalytics: G-5SLV8G8QD4
  opengraph:
    twitter:
      creator: '@dhernangomez'
      card: summary_large_image

development:
  mode: auto

repo:
  branch: main

home:
  title: nominatimlite | Interface with the OpenStreetMap Nominatim API
  description: |
    Lightweight interface to the OpenStreetMap Nominatim service for geocoding,
    reverse geocoding and spatial objects.

authors:
  Diego Hernangómez:
    href: https://dieghernan.github.io/
  Jindra Lacko:
    href: https://www.jla-data.net/
  OpenStreetMap:
    href: https://www.openstreetmap.org/copyright/
    html: >
      <img src='https://wiki.openstreetmap.org/w/images/6/6f/Made_with.svg'
      width='150' alt='OpenStreetMap' style='margin-bottom: 3px;'>
reference:
- title: Geocoding
  desc: >
    Search for addresses or structured queries and return coordinates.
  contents: has_concept("geocoding")
- title: Reverse geocoding
  desc: >
    Use coordinates to return addresses and place information.
  contents: has_concept("reverse")
- title: Spatial objects
  desc: >
    Return results as <a href="https://CRAN.R-project.org/package=sf"
    class="external-link"><span class="pkg">sf</span></a> objects.
  contents: has_concept("spatial")
- title: Datasets
  desc: Package datasets.
  contents:
  - has_concept("datasets")
- title: About the package
  contents: nominatimlite-package

articles:
- title: Articles
  navbar: Articles
  contents:
  - articles/leaflet
