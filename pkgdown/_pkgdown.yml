url: https://dieghernan.github.io/nominatimlite

template:
  bootstrap: 5
  package: gitdevr
  params:
    ganalytics: G-5SLV8G8QD4
  opengraph:
    twitter:
      creator: '@dhernangomez'
      card: summary_large_image

development:
  mode: auto

repo:
  branch: main

home:
  title: nominatimlite | Interface to the OpenStreetMap Nominatim API
  description: |
    Lightweight interface to the OpenStreetMap Nominatim service for geocoding,
    reverse geocoding, amenity lookup and spatial objects.

authors:
  Diego Hernangómez:
    href: https://dieghernan.github.io/
  Jindra Lacko:
    href: https://www.jla-data.net/
  OpenStreetMap:
    href: https://www.openstreetmap.org/copyright/
    html: >
      <img src='https://wiki.openstreetmap.org/w/images/6/6f/Made_with.svg'
      width='150' alt='OpenStreetMap' style='margin-bottom: 3px;'>
reference:
- title: Geocoding
  desc: >
    Search addresses and structured queries to return coordinates.
  contents:
  - geo_lite
  - geo_lite_struct
- title: Amenity lookup
  desc: >
    Search OpenStreetMap amenities within a bounding box.
  contents:
  - geo_amenity
- title: Address lookup
  desc: >
    Retrieve address details for OSM node, way and relation identifiers.
  contents:
  - geo_address_lookup
- title: Reverse geocoding
  desc: >
    Reverse geocode coordinates to return addresses and place information.
  contents:
  - reverse_geo_lite
- title: Spatial objects
  desc: >
    Return geocoding results as <a href="https://CRAN.R-project.org/package=sf"
    class="external-link"><span class="pkg">sf</span></a> objects.
  contents:
  - bbox_to_poly
  - geo_lite_sf
  - geo_lite_struct_sf
  - geo_amenity_sf
  - geo_address_lookup_sf
  - reverse_geo_lite_sf
- title: API management
  desc: >
    Check API availability and manage request behavior.
  contents:
  - nominatim_check_access
- title: Datasets
  desc: Data shipped with the package.
  contents:
  - osm_amenities
- title: About the package
  contents: nominatimlite-package

articles:
- title: Articles
  navbar: Articles
  contents:
  - articles/leaflet
