url: https://dieghernan.github.io/nominatimlite

template:
  bootstrap: 5
  package: gitdevr
  params:
    ganalytics: G-5SLV8G8QD4
  opengraph:
    twitter:
      creator: '@dhernangomez'
      card: summary_large_image

development:
  mode: auto

repo:
  branch: main

home:
  title: nominatimlite | Interface to the OpenStreetMap Nominatim API
  description: |
    Lightweight interface to the OpenStreetMap Nominatim API for geocoding,
    reverse geocoding, amenity lookup and address lookup. Results can be
    returned as data frames (tibbles) or sf objects.

authors:
  Diego Hernangómez:
    href: https://dieghernan.github.io/
  Jindra Lacko:
    href: https://www.jla-data.net/
  OpenStreetMap:
    href: https://www.openstreetmap.org/copyright/
    html: >
      <img src='https://wiki.openstreetmap.org/w/images/6/6f/Made_with.svg'
      width='150' alt='OpenStreetMap' style='margin-bottom: 3px;'>
reference:
- title: Geocoding
  desc: >
    Search addresses and structured queries to return coordinates.
  contents:
  - starts_with("geo_lite")
- subtitle: Amenity lookup
  desc: >
    Search OpenStreetMap amenities within a bounding box.
  contents:
  - has_concept("amenity")
- subtitle: Address lookup
  desc: >
    Retrieve address details for OSM node, way and relation identifiers.
  contents:
  - has_concept("lookup")
- title: Reverse geocoding
  desc: >
    Reverse geocode coordinates to return addresses and place information.
  contents:
  - has_concept("reverse")
- title: >
    <a href="https://CRAN.R-project.org/package=sf"
    class="external-link"><span class="pkg">sf</span></a> outputs
  desc: >
    Return API results as <a href="https://CRAN.R-project.org/package=sf"
    class="external-link"><span class="pkg">sf</span></a> objects and convert
    bounding boxes to <span class="pkg">sf</span> geometries.
  contents:
  - has_concept("spatial")
- title: API management
  desc: >
    Check API availability and manage request behavior.
  contents:
  - nominatim_check_access
- title: Datasets
  desc: Data shipped with the package.
  contents:
  - has_concept("datasets")
- title: About the package
  contents: nominatimlite-package

articles:
- title: Articles
  navbar: Articles
  contents:
  - articles/leaflet
