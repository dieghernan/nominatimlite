url: https://dieghernan.github.io/nominatimlite

template:
  bootstrap: 5
  package: gitdevr
  params:
    ganalytics: G-5SLV8G8QD4
  opengraph:
    twitter:
      creator: '@dhernangomez'
      card: summary_large_image

development:
  mode: auto

repo:
  branch: main

home:
  title: nominatimlite | Interface to the Nominatim API
  description: |
    Provides a lightweight interface to the Nominatim API for free-form and
    structured address searches, searches for addresses from coordinates,
    amenity lookup and address lookup by OpenStreetMap object identifier.
    Results are returned as tibbles or `sf` objects.

authors:
  Diego Hernangómez:
    href: https://dieghernan.github.io/
  Jindra Lacko:
    href: https://www.jla-data.net/
  OpenStreetMap:
    href: https://www.openstreetmap.org/copyright/
    html: >
      <img src='https://wiki.openstreetmap.org/w/images/6/6f/Made_with.svg'
      width='150' alt='OpenStreetMap' style='margin-bottom: 3px;'>

reference:
- title: Address search
  desc: >
    Perform free-form and structured address searches to find coordinates and
    place information.
- contents:
  - starts_with("geo_lite")

- title: Reverse geocoding
  desc: >
    Find addresses and place information from latitude and longitude coordinates.
- contents:
  - has_concept("reverse")

- title: Amenity lookup
  desc: >
    Search for OpenStreetMap amenities within a bounding box.
- contents:
  - has_concept("amenity")

- title: Address lookup
  desc: >
    Retrieve address details for OpenStreetMap node, way and relation
    identifiers.
- contents:
  - has_concept("lookup")

- title: Spatial helpers
  desc: >
    Convert bounding boxes to `sf` geometries. Functions that return `sf`
    objects are listed with their corresponding API operations above.
- contents:
  - bbox_to_poly

- title: Datasets
  desc: >
    Data shipped with the package.
- contents:
  - has_concept("datasets")

- title: Package documentation
  desc: >
    Package overview and metadata.
- contents:
  - nominatimlite-package

articles:
- title: Get started
  desc: >
    Learn how to search for addresses, perform reverse geocoding and work with
    Nominatim API results.
  contents:
  - nominatimlite

- title: Interactive maps
  navbar: Maps
  desc: >
    Display Nominatim API results with leaflet and use the data in interactive
    spatial workflows.
  contents:
  - articles/leaflet
